version: 2

models:
  - name: price_returns
    description: "Silver layer table containing cleaned and deduplicated daily price data with calculated daily returns for each asset."
    columns:
      - name: ticker
        description: "Asset ticker symbol"
        tests:
          - not_null
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: close_price
        description: "Daily closing price of the asset"
        tests:
          - not_null
      - name: previous_close
        description: "Previous trading day closing price used for return calculation"
      - name: daily_return_pct
        description: "Daily percentage return calculated as ((close - previous_close) / previous_close) * 100"
      - name: daily_return
        description: "Daily return in decimal form used for volatility and Sharpe calculations"